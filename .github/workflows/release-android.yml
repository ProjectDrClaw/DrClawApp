# 仅手动触发构建 Android 包，日常 push/PR / Release 不执行
# 签名使用仓库内团队统一证书：android/app/drclaw.jks + key.properties
name: Release Android

on:
  workflow_dispatch:
    inputs:
      env:
        description: 构建环境（dart-define ENV）
        required: true
        default: prod
        type: choice
        options:
          - prod
          - dev
      server_host:
        description: 服务端地址（dart-define SERVER_HOST，默认内网）
        required: true
        default: "10.110.177.132"
        type: string

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      BUILD_ENV: ${{ inputs.env }}
      SERVER_HOST: ${{ inputs.server_host }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验团队签名文件
        run: |
          test -f android/app/drclaw.jks || { echo "缺少 android/app/drclaw.jks"; exit 1; }
          test -f android/app/key.properties || { echo "缺少 android/app/key.properties"; exit 1; }
          echo "已检测到团队统一签名文件"

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 APK
        run: |
          echo "ENV=${BUILD_ENV} SERVER_HOST=${SERVER_HOST}"
          flutter build apk --release \
            --dart-define=ENV=${BUILD_ENV} \
            --dart-define=SERVER_HOST=${SERVER_HOST}
          ls -lh build/app/outputs/flutter-apk/

      - name: 重命名产物
        id: artifact
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | tr '+' '_')
          OUT="DrClaw-${VERSION}-${BUILD_ENV}.apk"
          SRC=$(ls build/app/outputs/flutter-apk/*.apk | head -1)
          cp "$SRC" "build/app/outputs/flutter-apk/${OUT}"
          echo "name=${OUT}" >> "$GITHUB_OUTPUT"
          echo "path=build/app/outputs/flutter-apk/${OUT}" >> "$GITHUB_OUTPUT"

      - name: 上传构建产物（Actions Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: drclaw-android-apk
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
