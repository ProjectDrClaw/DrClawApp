version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.2.1
  path_provider: ^2.0.13
  path: ^1.9.0
  record: ^6.0.0
  permission_handler: ^11.0.1
  just_audio: ^0.10.5
  flutter_screenutil: ^5.7.0
  openim_common:
    path: ../openim_common

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
